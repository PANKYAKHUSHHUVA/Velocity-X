<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity-X</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);

            // Light & Sky background
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.8;
            scene.clearColor = new BABYLON.Color3(0.5, 0.7, 1.0);

            // Road Ground
            const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 40, height: 2000 }, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.15);
            ground.material = groundMat;

            // Car Mesh (Chassis)
            const car = BABYLON.MeshBuilder.CreateBox("car", { width: 2, height: 1, depth: 4 }, scene);
            car.position.y = 0.5;
            
            const carMat = new BABYLON.StandardMaterial("carMat", scene);
            carMat.diffuseColor = new BABYLON.Color3(0.9, 0.1, 0.2);
            car.material = carMat;

            // Follow Camera
            const camera = new BABYLON.FollowCamera("FollowCam", new BABYLON.Vector3(0, 5, -10), scene);
            camera.lockedTarget = car;
            camera.radius = 12;
            camera.heightOffset = 4;
            camera.rotationOffset = 180;
            camera.cameraAcceleration = 0.05;
            camera.maxCameraSpeed = 20;

            // Controls Tracking
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);

            scene.actionManager.registerAction(
                new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (evt) => {
                    inputMap[evt.sourceEvent.key.toLowerCase()] = true;
                })
            );

            scene.actionManager.registerAction(
                new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (evt) => {
                    inputMap[evt.sourceEvent.key.toLowerCase()] = false;
                })
            );

            // Car Movement State
            let speed = 0;
            const maxSpeed = 0.8;
            const maxReverseSpeed = -0.3;
            const acceleration = 0.015;
            const friction = 0.98;
            const turnSpeed = 0.03;

            scene.onBeforeRenderObservable.add(() => {
                if (inputMap["w"] || inputMap["arrowup"]) {
                    speed = Math.min(speed + acceleration, maxSpeed);
                } else if (inputMap["s"] || inputMap["arrowdown"]) {
                    speed = Math.max(speed - acceleration, maxReverseSpeed);
                } else {
                    speed *= friction;
                }

                if (Math.abs(speed) > 0.01) {
                    const direction = speed > 0 ? 1 : -1;
                    if (inputMap["a"] || inputMap["arrowleft"]) {
                        car.rotation.y -= turnSpeed * direction;
                    }
                    if (inputMap["d"] || inputMap["arrowright"]) {
                        car.rotation.y += turnSpeed * direction;
                    }
                }

                const forward = car.getDirection(BABYLON.Axis.Z);
                car.moveWithCollisions(forward.scale(speed));
            });

            return scene;
        };

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
