<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Velocity-X</title>

<style>
html,body{
margin:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
}
#renderCanvas{
width:100%;
height:100%;
touch-action:none;
display:block;
}
</style>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>

<body>

<canvas id="renderCanvas"></canvas>

<script>

const canvas=document.getElementById("renderCanvas");
const engine=new BABYLON.Engine(canvas,true);

const createScene=()=>{

const scene=new BABYLON.Scene(engine);

scene.clearColor=new BABYLON.Color3(0.53,0.81,0.98);

const camera=new BABYLON.ArcRotateCamera(
"cam",
Math.PI/2,
1.2,
30,
BABYLON.Vector3.Zero(),
scene
);

camera.attachControl(canvas,true);

const light=new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(0,1,0),
scene
);

const ground=BABYLON.MeshBuilder.CreateGround(
"ground",
{
width:200,
height:200
},
scene
);

const road=BABYLON.MeshBuilder.CreateBox(
"road",
{
width:8,
height:0.1,
depth:200
},
scene
);

road.position.y=0.05;

road.material=new BABYLON.StandardMaterial("roadMat",scene);
road.material.diffuseColor=new BABYLON.Color3(0.15,0.15,0.15);

const car=BABYLON.MeshBuilder.CreateBox(
"car",
{
width:2,
height:1,
depth:4
},
scene
);

car.position.y=0.6;

return scene;

};

const scene=createScene();

engine.runRenderLoop(()=>{
scene.render();
});

window.addEventListener("resize",()=>{
engine.resize();
});

</script>

</body>
</html>
